# マチゴエ 収集ソース定義（2026-07-05 調査エージェント確認済みURLベース）
# type: rss | html_list　／ enabled: false は調査待ち・構造対応待ち
# no_filter: ページ自体が募集一覧なのでキーワード選別を通さない
# no_enrich: 詳細ページを取得しない（ボット遮断サイト。RSSのdescriptionから締切抽出）

# ---------- 国 ----------
- id: egov-pubcome
  name: e-Gov パブリックコメント（国）
  area: 国
  kind: pubcome
  type: rss
  url: https://public-comment.e-gov.go.jp/rss/pcm_list.xml
  no_filter: true
  no_enrich: true   # /rss/ 以外は403。descriptionに「受付締切日時：YYYY/MM/DD hh:mm」が入る
  note: >-
    RSS1.0(RDF)形式・直近12件のみ。【2026-07-06確認】e-Govは海外IPを遮断しており
    GitHub Actionsからは取得不可（fails計上は正常動作）。毎朝のローカル実行（日本IP）が
    このソースの収集経路。壊れ扱いにしないこと

